services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ""   # empty = uses CRA proxy (localhost:8000)
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - PORT=80
    restart: unless-stopped
